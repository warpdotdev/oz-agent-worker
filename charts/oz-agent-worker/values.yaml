# Keep this at 1 for a given worker.workerId. To run multiple workers, use distinct releases
# (or otherwise distinct worker IDs) instead of scaling one release horizontally.
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: warpdotdev/oz-agent-worker
  # Set this explicitly to a published worker image tag for each install.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

warp:
  apiKeySecret:
    create: false
    name: oz-agent-worker
    key: WARP_API_KEY
    value: ""
  webSocketURL: wss://oz.warp.dev/api/v1/selfhosted/worker/ws
  serverRootURL: https://app.warp.dev

worker:
  workerId: ""
  logLevel: info
  cleanup: true
  maxConcurrentTasks: 0
  idleOnComplete: ""
  extraArgs: []
  deploymentAnnotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # Conservative starting requests for the long-lived worker Deployment.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

kubernetesBackend:
  namespace: ""
  imagePullSecret: ""
  imagePullPolicy: IfNotPresent
  preflightImage: ""
  serviceAccountName: ""
  setupCommand: ""
  teardownCommand: ""
  nodeSelector: {}
  tolerations: []
  resources:
    requests: {}
    limits: {}
  extraLabels: {}
  extraAnnotations: {}
  activeDeadlineSeconds: null
  terminationGracePeriodSeconds: null
  workspaceSizeLimit: ""
  unschedulableTimeout: "30s"
  environment: []
