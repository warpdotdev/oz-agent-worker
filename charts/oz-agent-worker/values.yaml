nameOverride: ""
fullnameOverride: ""

image:
  repository: warpdotdev/oz-agent-worker
  # Set this explicitly to a published immutable worker image tag for each
  # install, e.g. v2026-06-01-10-09-37. Avoid using the mutable `latest` tag for
  # production self-hosted workers.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

warp:
  apiKeySecret:
    create: false
    name: oz-agent-worker
    key: WARP_API_KEY
    value: ""
  webSocketURL: wss://oz.warp.dev/api/v1/selfhosted/worker/ws
  serverRootURL: https://app.warp.dev

worker:
  workerId: ""
  logLevel: info
  cleanup: true
  maxConcurrentTasks: 0
  idleOnComplete: ""
  extraArgs: []
  extraEnv: []
  deploymentAnnotations: {}
  podAnnotations: {}
  podLabels: {}
  # Bounded grace period for worker pod termination. The Kubernetes backend
  # preserves active task Jobs when the worker pod is disrupted, so this only
  # needs to cover WebSocket close and metrics shutdown.
  terminationGracePeriodSeconds: 30
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # Liveness probe for the long-lived worker process. The default checks that
  # PID 1 is still running. Override with an httpGet probe if you add a health
  # endpoint to the worker.
  livenessProbe:
    exec:
      command: ["/bin/sh", "-c", "kill -0 1"]
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  # Conservative starting requests for the long-lived worker Deployment.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

kubernetesBackend:
  namespace: ""
  defaultImage: ""
  imagePullPolicy: IfNotPresent
  useImageVolumes: false
  preflightImage: ""
  sidecarImage: ""
  # Optional: map a harness config name (e.g. claude, codex) to a custom Docker
  # image mounted as that harness's coding CLI sidecar at /mnt/{harness}-cli-sidecar.
  # Use this when your cluster runs a custom or internal Claude Code binary wrapper
  # instead of the Warp-provided image. The custom image must have the harness binary
  # on PATH (typically /usr/local/bin). Example:
  #   codingCliSidecars:
  #     claude: "registry.internal.example.com/my-claude-wrapper:v1"
  codingCliSidecars: {}
  setupCommand: ""
  teardownCommand: ""
  extraLabels: {}
  extraAnnotations: {}
  activeDeadlineSeconds: null
  # Fallback cleanup for task Jobs that finish after the worker pod that created
  # them has been disrupted. When worker.cleanup=false, the worker does not set
  # a TTL so Jobs remain available for debugging.
  ttlSecondsAfterFinished: 86400
  workspaceSizeLimit: ""
  unschedulableTimeout: "30s"
  # Optional: raw Kubernetes PodSpec YAML for task Jobs. Configure task-pod
  # scheduling, serviceAccountName, imagePullSecrets, resources, and env here
  # using standard K8s syntax (e.g. containers[].env with valueFrom.secretKeyRef).
  # Note: when a run's runner specifies an instance shape, the worker sets the task
  # container's CPU/memory requests and limits from that shape per run, overriding any
  # matching resources set on the "task" container here (other entries are preserved).
  podTemplate: {}
  # Optional: cpu/memory requests and limits applied to the startup preflight
  # Job containers. When omitted the worker applies default resource constraints.
  # Example:
  #   preflightResources:
  #     requests:
  #       cpu: 10m
  #       memory: 16Mi
  #     limits:
  #       cpu: 100m
  #       memory: 64Mi
  preflightResources: {}

# Metrics export uses the OpenTelemetry autoexport package, so the operator
# selects the exporter via standard OpenTelemetry environment variables. When
# `metrics.enabled` is false the worker emits no metrics, matching the
# pre-existing behavior.
metrics:
  enabled: false
  # Exporter to enable. Supported: prometheus | otlp | console | none.
  # When set to prometheus, the worker exposes /metrics on `metrics.port`.
  # When set to otlp, configure OTEL_EXPORTER_OTLP_ENDPOINT (and friends) via
  # `metrics.extraEnv` below.
  exporter: prometheus
  # Port served by the embedded Prometheus exporter. Ignored for otlp/console.
  port: 9464
  # Extra environment variables forwarded to the worker container, e.g. to
  # configure the OTLP endpoint:
  #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #     value: http://otel-collector.observability.svc:4318
  extraEnv: []
  service:
    create: true
    type: ClusterIP
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9464"
      prometheus.io/path: "/metrics"
  # Optional Prometheus Operator PodMonitor for clusters that prefer
  # PodMonitor/ServiceMonitor over scrape annotations. Disabled by default to
  # avoid requiring monitoring.coreos.com CRDs at install time.
  podMonitor:
    create: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
