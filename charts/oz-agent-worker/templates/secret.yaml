{{- if .Values.warp.apiKeySecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oz-agent-worker.apiKeySecretName" . }}
  labels:
    {{- include "oz-agent-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.warp.apiKeySecret.key }}: {{ required "warp.apiKeySecret.value is required when warp.apiKeySecret.create=true" .Values.warp.apiKeySecret.value | quote }}
{{- end }}
