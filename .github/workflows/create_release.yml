name: Create Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-tag:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: namespace-profile-ubuntu-small
    outputs:
      tag_name: ${{ steps.tag.outputs.name }}
    steps:
      - name: Generate tag name
        id: tag
        run: echo "name=v$(date -u +'%Y-%m-%d-%H-%M-%S')" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-tag
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/build_release.yml
    secrets: inherit
    with:
      docker_tag: ${{ needs.generate-tag.outputs.tag_name }}
      publish_latest: true
      # Stamp the same tag into main.Version so `oz_worker_info{version=...}`
      # in /metrics matches the published release tag and Docker image tag.
      version: ${{ needs.generate-tag.outputs.tag_name }}

  release:
    needs: [generate-tag, build]
    runs-on: namespace-profile-ubuntu-small
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: namespace-actions/download-artifact@v1
        with:
          # Only download release artifacts, not Docker image metadata.
          pattern: oz-agent-worker-*
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.generate-tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: true
          body: |
            **Docker image tag:** `${{ needs.build.outputs.tagged_image }}`
            **Docker image digest:** `${{ needs.build.outputs.image }}`

            `latest` was updated to this same image as part of this release. For production self-hosted workers, pin the immutable release tag or digest instead of `latest`.
          files: artifacts/**/*
