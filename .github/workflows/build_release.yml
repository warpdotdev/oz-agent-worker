name: Build Release

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag (leave empty to skip Docker push)'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      docker_tag:
        description: 'Docker image tag (leave empty to skip Docker push)'
        required: false
        default: ''
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      image:
        description: 'Full Docker image reference'
        value: ${{ jobs.docker.outputs.image }}

jobs:
  build:
    name: "Build ${{ matrix.goos }} ${{ matrix.goarch }}"
    runs-on: namespace-profile-ubuntu-small
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          # Use the Namespace Go cache
          cache: false
    
      - name: Set up build cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          binary="oz-agent-worker"
          if [ "$GOOS" = "windows" ]; then
            binary="oz-agent-worker.exe"
          fi
          go build -o "$binary" .

      - name: Archive
        run: |
          prefix="oz-agent-worker-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${prefix}.zip" oz-agent-worker.exe
          else
            tar czf "${prefix}.tar.gz" oz-agent-worker
            tar cJf "${prefix}.tar.xz" oz-agent-worker
          fi

      - name: Upload artifact
        uses: namespace-actions/upload-artifact@v1
        with:
          name: oz-agent-worker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            oz-agent-worker-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            oz-agent-worker-${{ matrix.goos }}-${{ matrix.goarch }}.tar.xz
            oz-agent-worker-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  docker:
    name: Build and push Docker image
    runs-on: namespace-profile-ubuntu-small
    outputs:
      image: "warpdotdev/oz-agent-worker@${{ steps.push.outputs.digest }}"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          provenance: mode=max
          sbom: true
          # Only push tagged images. When not pushing, we need to provide a fallback output
          # as multi-platform images can't be loaded into the local Docker store by default.
          # See https://docs.docker.com/reference/cli/docker/buildx/build/#docker
          outputs: ${{ inputs.docker_tag != '' && 'type=registry' || 'type=local,dest=built-images' }}
          platforms: linux/amd64,linux/arm64
          tags: warpdotdev/oz-agent-worker:${{ inputs.docker_tag || github.sha }}
          labels:
            dev.warp.worker-commit=${{ github.sha }}
